<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Password</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      .login-container {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #111827, #2563eb);
        font-family: Arial, sans-serif;
      }
      
      .login-box {
        background: white;
        padding: 40px;
        width: 350px;
        border-radius: 12px;
        box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.25);
      }
      
      .login-box h2 {
        text-align: center;
        margin-bottom: 25px;
      }
      
      .login-box input {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
      }
      
      .login-box input:focus {
        outline: none;
        border-color: #2563eb;
      }
      
      .login-btn {
        width: 100%;
        padding: 12px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 15px;
        cursor: pointer;
      }
      
      .login-btn:hover {
        background: #1e40af;
      }
      
      .extra-text {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
      }
      
      .extra-text a {
        color: #2563eb;
        text-decoration: none;
      }
      
      .extra-text a:hover {
        text-decoration: underline;
      }
      
      /* Optional: error message styling */
      .errorlist {
        color: red;
        margin-bottom: 10px;
        list-style: none;
        padding-left: 0;
      }
    </style>
  </head>

  <body>
    <div class="login-container">
      <div class="login-box">
        <h2>Update Account</h2>

        <form method="POST">
          {% csrf_token %}
          {{ form.as_p }}
          <button type="submit" class="login-btn">Change Password</button>

          <div class="extra-text">
            <p>
              Back to home? <a href="{% url 'home' %}">Cancel</a>
            </p>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
