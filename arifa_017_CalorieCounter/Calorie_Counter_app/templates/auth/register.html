<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      .signup-container {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #111827, #1d4ed8);
        font-family: Arial, sans-serif;
      }
      
      .signup-box {
        background: white;
        padding: 30px;
        width: 360px;
        border-radius: 12px;
        box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.2);
      }
      
      .signup-box h2 {
        text-align: center;
        margin-bottom: 25px;
      }
      
      .signup-box input,
      .signup-box select {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
      }
      
      .signup-box input:focus,
      .signup-box select:focus {
        outline: none;
        border-color: #2563eb;
      }
      
      .signup-btn {
        width: 100%;
        padding: 12px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 15px;
        cursor: pointer;
      }
      
      .signup-btn:hover {
        background: #1e40af;
      }
    </style>
  </head>

  <body>
    <div class="signup-container">
      <div class="signup-box">
        <h2>Create Account</h2>
        {% comment %} {% include 'auth/messages.html' %} {% endcomment %}

        <form method="POST">
          {% csrf_token %}
          {{ form }}

          <button type="submit" class="signup-btn">Sign Up</button>

          <div class="extra-text">
            <p>
              Already have an account? <a href="{% url 'login' %}">Login</a>
            </p>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
