<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Scribbles by Arifa Sultana{% endblock %}</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: globalGradient 15s ease infinite;
            background-attachment: fixed;
            min-height: 100vh;
        }

        @keyframes globalGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 60px;
            background: rgba(17, 24, 39, 0.9);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .main-wrapper {
            padding-top: 100px;
        }

        .logo {
            color: white;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            align-items: center;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 25px;
            font-size: 15px;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #60a5fa;
        }

        /* User Identity Styling */
        .user-greet {
            color: #60a5fa;
            font-weight: 600;
            font-size: 14px;
            background: rgba(96, 165, 250, 0.1);
            padding: 5px 12px;
            border-radius: 50px;
            border: 1px solid rgba(96, 165, 250, 0.3);
            margin-left: 20px;
        }

        .signup-btn {
            background: #3b82f6;
            padding: 8px 18px;
            border-radius: 6px;
            font-weight: 600;
        }

        .signup-btn:hover {
            background: #2563eb;
        }
    </style>
</head>

<body>

{% include "master/nav.html" %}

    <div class="main-wrapper">
        {% block body %}
        {% endblock body %}
    </div>

</body>
</html>
