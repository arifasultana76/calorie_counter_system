{% extends 'master/base.html' %}

{% block body %}

<div class="form-container">

    <div class="form-box">

        <h2>Add Calorie Entry</h2>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit">Add Entry</button>

        </form>

    </div>

</div>


<style>

.form-container{
display:flex;
justify-content:center;
align-items:center;
height:80vh;
}

.form-box{

background:white;

padding:35px;

border-radius:10px;

width:350px;

box-shadow:0 10px 25px rgba(0,0,0,0.15);

}

h2{

text-align:center;

margin-bottom:20px;

color:#333;

}

input, select{

width:100%;

padding:10px;

margin:8px 0;

border:1px solid #ccc;

border-radius:5px;

}

button{

width:100%;

padding:12px;

background:#23a6d5;

color:white;

border:none;

border-radius:5px;

font-weight:bold;

cursor:pointer;

}

button:hover{

background:#1b8ab3;

}

</style>

{% endblock %}
